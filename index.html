    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    <script>
      // Sélection dynamique du manifest selon le contexte
      (function() {
        const appType = new URLSearchParams(window.location.search).get('app');
        let manifestPath = '/manifest.json';
        
        if (appType === 'client') manifestPath = '/manifest.client.json';
        else if (appType === 'driver') manifestPath = '/manifest.driver.json';
        else if (appType === 'partner') manifestPath = '/manifest.partner.json';
        
        document.getElementById('app-manifest').setAttribute('href', manifestPath);
      })();
    </script>

  <script>
// Force unregister ALL service workers and clear ALL caches
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    registrations.forEach(function(registration) {
      registration.unregister();
      console.log('SW unregistered');
    });
  });
}
if ('caches' in window) {
  caches.keys().then(function(names) {
    names.forEach(function(name) {
      caches.delete(name);
      console.log('Cache deleted:', name);
    });
  });
}
